name: CD - Deploy Backend

on:
  workflow_run:
    workflows: ["CI - Java with Gradle"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script_stop: true
          debug: true
          script: |
            set -e
            cd ~/habit-tracker-backend
            git pull
            chmod +x gradlew
            ./gradlew build
            sudo systemctl restart habittracker

            sleep 2

            for i in {1..10}; do
              if curl -fs http://localhost:8080/health; then
                echo "App started successfully"
                exit 0
              fi
              sleep 2
            done

            echo "App failed to start"
            sudo systemctl status habittracker --no-pager || true
            sudo journalctl -u habittracker -n 50 --no-pager || true
            exit 1
