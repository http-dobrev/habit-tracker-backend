services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: habittracker
      POSTGRES_USER: habittracker_user
      POSTGRES_PASSWORD: habiko123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/habittracker
      SPRING_DATASOURCE_USERNAME: habittracker_user
      SPRING_DATASOURCE_PASSWORD: habiko123
      JWT_SECRET: ${JWT_SECRET}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}

volumes:
  postgres_data:
